        #         # nupkg is a zip file — extract directly to the cache target
        #         Expand-Archive -Path $nupkgFile -DestinationPath $targetDir -Force
        #         Write-Host "Cached to: $targetDir"
        #       }
        #     workingDirectory: '$(Build.SourcesDirectory)'

        # - task: PowerShell@2
        #   displayName: 'Prepare npm auth for gulp subprocess installs'
        #   inputs:
        #     targetType: inline
        #     pwsh: true
        #     script: |
        #       # gulpfile.js runNpmInstall() spawns npm with --userconfig pointing to a
        #       # relative path that doesn't resolve from _build/. Dotfiles aren't copied
        #       # either, so npm has no auth for the internal feed -> 401.
        #       # Fix: write auth to npm GLOBAL config which npm always reads.
        #       $rootNpmrc = Join-Path '$(Build.SourcesDirectory)' '.npmrc'
        #       $authLines = Get-Content $rootNpmrc | Where-Object { $_ -match '^//' }

        #       $globalPrefix = (npm config get prefix).Trim()
        #       $globalNpmrc = Join-Path $globalPrefix 'etc' 'npmrc'
        #       New-Item -ItemType Directory -Path (Split-Path $globalNpmrc) -Force | Out-Null
        #       foreach ($line in $authLines) {
        #         Add-Content -Path $globalNpmrc -Value $line
        #       }
        #       Write-Host "Wrote $($authLines.Count) auth line(s) to global npmrc: $globalNpmrc"

        #       # Delete lockfiles so npm resolves from internal feed, not npmjs.org
        #       foreach ($ext in @('ArtifactEngine', 'ArtifactEngineV2')) {
        #         $lockFile = Join-Path '$(Build.SourcesDirectory)' 'Extensions' $ext 'package-lock.json'
        #         if (Test-Path $lockFile) {
        #           Remove-Item $lockFile -Force
        #           Write-Host "Deleted lockfile: Extensions/$ext/package-lock.json"
        #         }
        #       }
        #     workingDirectory: '$(Build.SourcesDirectory)'

        - task: PowerShell@2
          displayName: 'Build test resources'
          inputs:
            targetType: inline
            script: 'gulp build --test'
            workingDirectory: '$(Build.SourcesDirectory)'

        - task: PowerShell@2
          displayName: 'Package test resources'
          inputs:
            targetType: inline
            script: 'gulp package'
            workingDirectory: '$(Build.SourcesDirectory)'

        - task: PowerShell@2
          displayName: 'Copy test .vsix file(s) to unsigned artifacts directory'
          inputs:
            targetType: inline
            pwsh: true
            script: |
              $targetDir = '$(System.ArtifactsDirectory)/test-unsigned'
              $packageDir = '$(Build.SourcesDirectory)/_package'
              $extensions = '$(DetectedExtensions)' -split ';'

              New-Item -ItemType Directory -Path $targetDir -Force | Out-Null

              $copiedCount = 0
              $copiedExtensions = @()

              foreach ($ext in $extensions) {
                $ext = $ext.Trim()
                if (-not $ext) { continue }

                $extDir = Join-Path $packageDir $ext
                $vsixFiles = Get-ChildItem -Path $extDir -Filter '*.vsix' -ErrorAction SilentlyContinue

                if ($vsixFiles -and $vsixFiles.Count -gt 0) {
                  foreach ($vsix in $vsixFiles) {
                    Copy-Item -Path $vsix.FullName -Destination $targetDir -Force
                    Write-Host "Copied: $($vsix.Name) (from $ext)"
                    $copiedCount++
                  }
                  $copiedExtensions += $ext
                } else {
                  Write-Host "##[warning]No .vsix found for '$ext' — packaging may have failed. Skipping."
                }
              }

              if ($copiedCount -eq 0) {
                Write-Host "##[error]No .vsix files copied. All detected extensions failed to package."
                exit 1
              }

              Write-Host "Copied $copiedCount .vsix file(s) for: $($copiedExtensions -join ', ')"

    # ======= Publish unsigned test extension on Marketplace (visibility set to private) =======
    - stage: Publish_Test_Extension
      displayName: 'Publish unsigned test extension on Marketplace (private)'
      dependsOn: Build_And_Package_Test_Extension
      condition: and(succeeded(), ne(variables['Build.Reason'], 'Manual'))
      jobs:
      - job: PublishTestExtension
        displayName: 'Publish unsigned test extension on Marketplace'
        steps:
        - checkout: self
          displayName: 'Checkout repository (for .npmrc auth)'
          clean: true
          fetchTags: false

        - download: current
          artifact: vsix-test-unsigned
          displayName: 'Download unsigned test .vsix'

        - task: NodeTool@0
          displayName: 'Use Node.js 20.x'
          inputs:
            versionSpec: '20.x'

        # - task: NpmAuthenticate@0
        #   displayName: 'Authenticate npm with internal feed'
        #   inputs:
        #     workingFile: .npmrc

        # - task: PowerShell@2
        #   displayName: 'Write npm auth to user config (Network Isolation workaround)'
        #   inputs:
        #     targetType: inline
        #     pwsh: true
        #     script: |
        #       # TfxInstaller@5 uses --prefix <temp> which changes the global config
        #       # location. Write auth to USER config (~/.npmrc) which npm always reads.
        #       $rootNpmrc = Join-Path '$(Build.SourcesDirectory)' '.npmrc'
        #       $authLines = Get-Content $rootNpmrc | Where-Object { $_ -match '^//' }
        #       $userNpmrc = Join-Path $env:USERPROFILE '.npmrc'
        #       foreach ($line in $authLines) {
        #         Add-Content -Path $userNpmrc -Value $line
        #       }
        #       Write-Host "Wrote $($authLines.Count) auth line(s) to user npmrc: $userNpmrc"

        - task: TfxInstaller@5
          displayName: 'Install TFX'
          inputs:
            version: 'v0.22.2'

        - task: AzureCLI@2
          displayName: 'Publish all test extensions (unsigned)'
          inputs:
            azureSubscription: '1es-extensions-publication-secure-service-connection'
            scriptType: pscore
            scriptLocation: inlineScript
            inlineScript: |
              $vsixDir = "$(Pipeline.Workspace)/vsix-test-unsigned"
              $vsixFiles = Get-ChildItem -Path $vsixDir -Filter "*.vsix"

              if ($vsixFiles.Count -eq 0) {
                Write-Host "##[error]No .vsix files found in $vsixDir"
                exit 1
              }

              Write-Host "Found $($vsixFiles.Count) VSIX file(s) to publish:"
              $vsixFiles | ForEach-Object { Write-Host "  - $($_.Name)" }

              # Get a marketplace access token from the authenticated service connection
              $token = az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv
              if (-not $token) {
                Write-Host "##[error]Failed to acquire marketplace access token"
                exit 1
              }

              # For PR builds, override the patch version with the PR number so each PR
              # gets an isolated test extension on the marketplace. This avoids cross-PR
              # conflicts when multiple developers bump to the same version.
              # Re-runs of the same PR use --override to update with the latest code.
              # Manual/CI builds publish with the version as-is from vss-extension.json.
              $isPR = "$(Build.Reason)" -eq "PullRequest"
              $prId = if ($isPR) { "$(System.PullRequest.PullRequestId)" } else { $null }

              if ($isPR) {
                Write-Host "PR build detected (PR #$prId). Patch version will be overridden to isolate this PR."
              }

              $failCount = 0
              foreach ($vsix in $vsixFiles) {
                Write-Host "`nPublishing: $($vsix.Name)..."

                # --override overwrites the same version with new code on re-runs.
                # For PR builds, override version to 0.0.<prId> to isolate each PR.
                $overrideArgs = if ($isPR) { @("--override", "{`"version`": `"0.0.$prId`"}") } else { @() }
                tfx extension publish --vsix $vsix.FullName --service-url https://marketplace.visualstudio.com --auth-type pat --token $token --no-color --override @overrideArgs
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##[error]Failed to publish $($vsix.Name)"
                  $failCount++
                } else {
                  Write-Host "Published: $($vsix.Name)"
                }
              }

              if ($failCount -gt 0) {
                Write-Host "##[error]$failCount of $($vsixFiles.Count) extension(s) failed to publish"
                exit 1
              }

              Write-Host "`nAll $($vsixFiles.Count) extension(s) published successfully"

    # ======= Execute CI tests and verify the newly published test extension =======
    - ${{ if ne(parameters.skipCiTesting, true) }}:
      - stage: Execute_CI_Tests
        displayName: 'Execute CI tests against the test extension'
        dependsOn: Publish_Test_Extension
        condition: and(succeeded(), ne(variables['Build.Reason'], 'Manual'))
        variables:
          CI_TESTS_ORG_URL: 'https://dev.azure.com/canarytest'
          CI_TESTS_PROJECT: 'PipelineTasks'
        jobs:
        # ── Manual runs: single extension using existing scripts ──
        - job: ManualCiTest
          displayName: 'Trigger CI test pipeline (manual run)'
          condition: ne(variables['Build.Reason'], 'PullRequest')
          timeoutInMinutes: 120
          steps:
          - task: PowerShell@2
            name: DetermineCiTestPipelineName
            displayName: 'Determine CI test pipeline for selected extension'
            inputs:
              filePath: '$(Build.SourcesDirectory)/scripts/DetermineCiTestPipelineName.ps1'
              arguments: -ExtensionName "${{ parameters.extensionName }}"
              pwsh: true
              failOnStderr: true
          - task: AzureCLI@2
            displayName: 'Trigger CI pipeline and wait for result'
            inputs:
              azureSubscription: 'canarytest-extensions-ci-tests-pipeline-connector'
              scriptType: pscore
              scriptLocation: scriptPath
              scriptPath: '$(Build.SourcesDirectory)/scripts/TriggerAdoPipelineAndWaitResult.ps1'
              arguments: >
                -OrgUrl "$(CI_TESTS_ORG_URL)"
                -Project "$(CI_TESTS_PROJECT)"
                -PipelineName "$(TARGET_PIPELINE_NAME)"
                -TimeoutMinutes 120

        # ── PR triggers (/azp run): all changed extensions in parallel ──
        - job: PrCiTests
          displayName: 'Trigger CI test pipelines for all changed extensions (PR)'
          condition: eq(variables['Build.Reason'], 'PullRequest')
          timeoutInMinutes: 120
          steps:
          - task: PowerShell@2
            displayName: 'Re-detect changed extensions'
            inputs:
              filePath: '$(Build.SourcesDirectory)/scripts/DetectChangedExtension.ps1'
              arguments: -ParameterExtensionName "${{ parameters.extensionName }}"
              pwsh: true
              
          - task: AzureCLI@2
            displayName: 'Trigger CI tests for all detected extensions and wait for results'
            inputs:
              azureSubscription: 'canarytest-extensions-ci-tests-pipeline-connector'
              scriptType: pscore
              scriptLocation: scriptPath
              scriptPath: '$(Build.SourcesDirectory)/scripts/TriggerCiTestsForAllExtensions.ps1'
              arguments: >
                -Extensions "$(DetectedExtensions)"
                -OrgUrl "$(CI_TESTS_ORG_URL)"
                -Project "$(CI_TESTS_PROJECT)"
                -TimeoutMinutes 120

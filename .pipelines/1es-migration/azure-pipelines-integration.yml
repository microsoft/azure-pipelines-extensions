# CI Pipeline: Validates extension changes on user/feature branches.
# Builds and publishes an unsigned TEST extension, then runs CI tests.
# No ESRP signing — avoids 1ES branch control restrictions on non-master branches.
#
# Note: Manual runs are disabled — all stages are skipped when Build.Reason is 'Manual'.
# This pipeline is intended for PR validation and CI triggers only.

name: CI - Extension $(ExtensionName) - $(Date:yyyyMMdd)$(Rev:.r)
appendCommitMessageToRunName: false

trigger: none

pr:
  branches:
    include:
    - master

parameters:
- name: extensionName
  displayName: 'Extension to Build and Test'
  type: string
  default: 'auto'
  values:
  - auto
  - Ansible
  - BitBucket
  - CircleCI
  - ExternalTfs
  - IISWebAppDeploy
  - ServiceNow
  - TeamCity
- name: skipCiTesting
  displayName: 'Skip CI testing (use only if CI tests for the selected extension are not yet available)'
  type: boolean
  default: false

variables:
# 1ES Security Scanning
- name: CodeQL.Enabled
  value: true
# Dynamic (overridden by DetectChangedExtension.ps1 for PR triggers)
- name: ExtensionName
  value: ${{ parameters.extensionName }}
- name: DetectedExtensions
  value: ${{ parameters.extensionName }}
- name: ExtensionCopyPattern
  value: ${{ parameters.extensionName }}

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    sdl:
      sourceAnalysisPool:
        name: 1ESPtTfsAgentBuildPoolSDL
      spotBugs:
        enabled: false
      credscan:
        enabled: true
      binskim:
        enabled: true
      eslint:
        enabled: true

    pool:
      name: 1ESPtTfsAgentBuildPool1

    customBuildTags:
    - ES365AIMigrationTooling
    - 1ES-AzureExtensions
    - CI-Verification
    - Extension-${{ parameters.extensionName }}

    stages:

    # ======= Build & Package test extension =======
    - stage: Build_And_Package_Test_Extension
      displayName: 'Build & Package test extension'
      condition: ne(variables['Build.Reason'], 'Manual')
      jobs:
      - job: BuildAndPackage
        displayName: 'Build & Package test extension'
        templateContext:
          outputs:
          - output: pipelineArtifact
            displayName: 'Publish unsigned test build artifacts'
            targetPath: '$(System.ArtifactsDirectory)/test-unsigned'
            artifactName: 'vsix-test-unsigned'
        steps:
        - checkout: self
          displayName: 'Checkout repository'
          clean: true
          fetchTags: false

        - task: PowerShell@2
          displayName: 'Auto-detect changed extensions (PR triggers only)'
          condition: eq(variables['Build.Reason'], 'PullRequest')
          inputs:
            filePath: '$(Build.SourcesDirectory)/scripts/DetectChangedExtension.ps1'
            arguments: -ParameterExtensionName "${{ parameters.extensionName }}"
            pwsh: true

        - task: NodeTool@0
          displayName: 'Use Node.js 20.x'
          inputs:
            versionSpec: '20.x'

        - task: Npm@1
          displayName: 'Install dependencies'
          inputs:
            command: install
            verbose: false

        - task: Npm@1
          displayName: 'Install TFX CLI'
          inputs:
            command: custom
            customCommand: 'install -g tfx-cli --registry https://pkgs.dev.azure.com/mseng/PipelineTools/_packaging/PipelineTools_PublicPackages/npm/registry/'

        - task: Npm@1
          displayName: 'Install Gulp CLI'
          inputs:
            command: custom
            customCommand: 'install -g gulp-cli --registry https://pkgs.dev.azure.com/mseng/PipelineTools/_packaging/PipelineTools_PublicPackages/npm/registry/'

        - task: PowerShell@2
        #   displayName: 'Pre-cache PowerShell Gallery packages (Network Isolation workaround)'
        #   inputs:
        #     targetType: inline
        #     pwsh: true
        #     script: |
        #       # The 1ES build pool blocks outbound HTTPS to powershellgallery.com via DNS sinkholing.
        #       # Pre-extract vendored .nupkg files into the gulp cache directory so that
        #       # cacheArchiveFile() in gulpfile.js finds them already cached and skips the download.
        #       $packages = @(
        #         @{ Name = 'VstsTaskSdk';    Version = '0.7.1' }
        #         @{ Name = 'RemoteDeployer'; Version = '0.1.0' }
        #       )
        #       foreach ($pkg in $packages) {
        #         $url = "https://www.powershellgallery.com/api/v2/package/$($pkg.Name)/$($pkg.Version)"

version: 2

updates:
  # Root project
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # Extensions/Ansible
  - package-ecosystem: "npm"
    directory: "/Extensions/Ansible/Src/Tasks/Ansible"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # Extensions/ArtifactEngine
  - package-ecosystem: "npm"
    directory: "/Extensions/ArtifactEngine"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # Extensions/BitBucket
  - package-ecosystem: "npm"
    directory: "/Extensions/BitBucket/Src/Tasks/DownloadArtifactsBitbucket"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # Extensions/CircleCI
  - package-ecosystem: "npm"
    directory: "/Extensions/CircleCI/Src/Tasks/DownloadCircleCIArtifacts"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # Extensions/Common (vsts-task-lib)
  - package-ecosystem: "npm"
    directory: "/Extensions/Common/lib/vsts-task-lib"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # Extensions/ExternalTfs - Build Artifacts
  - package-ecosystem: "npm"
    directory: "/Extensions/ExternalTfs/Src/Tasks/DownloadExternalBuildArtifacts"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # Extensions/ExternalTfs - TFS Git
  - package-ecosystem: "npm"
    directory: "/Extensions/ExternalTfs/Src/Tasks/DownloadArtifactsTfsGit"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # Extensions/ExternalTfs - TFS Version Control
  - package-ecosystem: "npm"
    directory: "/Extensions/ExternalTfs/Src/Tasks/DownloadArtifactsTfsVersionControl"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # Extensions/TeamCity
  - package-ecosystem: "npm"
    directory: "/Extensions/TeamCity/Src/Tasks/DownloadTeamCityArtifacts"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

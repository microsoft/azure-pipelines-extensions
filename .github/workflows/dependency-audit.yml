name: Dependency Audit Fix

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "10"

jobs:
  audit-fix:
    name: npm audit fix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit fix across all projects
        id: audit
        run: |
          DIRS=(
            "."
            "Extensions/Ansible/Src/Tasks/Ansible"
            "Extensions/ArtifactEngine"
            "Extensions/BitBucket/Src/Tasks/DownloadArtifactsBitbucket"
            "Extensions/CircleCI/Src/Tasks/DownloadCircleCIArtifacts"
            "Extensions/Common/lib/vsts-task-lib"
            "Extensions/ExternalTfs/Src/Tasks/DownloadExternalBuildArtifacts"
            "Extensions/ExternalTfs/Src/Tasks/DownloadArtifactsTfsGit"
            "Extensions/ExternalTfs/Src/Tasks/DownloadArtifactsTfsVersionControl"
            "Extensions/TeamCity/Src/Tasks/DownloadTeamCityArtifacts"
          )

          REPORT=""
          HAS_CHANGES=false

          for dir in "${DIRS[@]}"; do
            echo "============================================"
            echo "Processing: $dir"
            echo "============================================"
            cd "$GITHUB_WORKSPACE/$dir"

            # Capture audit output before fix
            BEFORE=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities // empty' || echo "{}")

            # Run audit fix (non-breaking changes only)
            npm audit fix --package-lock-only 2>&1 || true

            # Capture audit output after fix
            AFTER=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities // empty' || echo "{}")

            if [ "$BEFORE" != "$AFTER" ]; then
              HAS_CHANGES=true
              REPORT="${REPORT}\n### \`${dir}\`\n**Before:** ${BEFORE}\n**After:** ${AFTER}\n"
            fi
          done

          cd "$GITHUB_WORKSPACE"

          if [ "$HAS_CHANGES" = true ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            # Store report for PR body (escape newlines for GH Actions)
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "report<<$EOF" >> "$GITHUB_OUTPUT"
            echo -e "$REPORT" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No vulnerabilities were fixed by npm audit fix."
          fi

      - name: Create Pull Request
        if: steps.audit.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: apply npm audit fix across all projects"
          branch: automated/npm-audit-fix
          delete-branch: true
          title: "[Automated] npm audit fix — dependency vulnerability patches"
          body: |
            ## Automated Dependency Audit Fix

            This PR was automatically generated by the **Dependency Audit Fix** workflow.
            It applies `npm audit fix --package-lock-only` across all npm projects in the repository.

            ### Changes Summary
            ${{ steps.audit.outputs.report }}

            ### What to review
            - Verify no breaking changes in `package-lock.json` updates
            - Ensure CI passes (build + test)

            ---
            _Generated by `.github/workflows/dependency-audit.yml`_
          labels: |
            dependencies
            automated
